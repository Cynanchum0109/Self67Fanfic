
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>67Cynanchum</title>
    <!-- Favicon - 根目录的 favicon.ico（浏览器默认查找）和 favicon_io 文件夹中的图标 -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="shortcut icon" href="/favicon.ico">
    <!-- 不同尺寸的 PNG 图标 -->
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon_io/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon_io/favicon-32x32.png">
    <link rel="apple-touch-icon" href="/assets/favicon_io/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FAF8F1;
            /* 淡纸纹：细微横向罗纹，宣纸质感 */
            background-image: repeating-linear-gradient(
                0deg,
                rgba(150, 130, 180, 0.03) 0px,
                rgba(150, 130, 180, 0.03) 1px,
                transparent 1px,
                transparent 4px
            );
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }
        .serif-text {
            font-family: 'Noto Serif SC', serif;
        }
        /* Text selection color */
        ::selection {
            background-color: #CBE9E1;
            color: #4E4462;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #F0EDF5;
        }
        ::-webkit-scrollbar-thumb {
            background: #C6B8D8;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #A99BC1;
        }
        /* Smooth focus rings */
        :focus-visible {
            outline: 2px solid #6FCBB8;
            outline-offset: 2px;
        }
    </style>
</head>
<body class="text-gray-900">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
